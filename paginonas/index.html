<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOTLINE MIAMI - PORTAL PRINCIPAL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Impact', 'Arial Black', sans-serif;
        }

        body {
            background-color: #03030d;
            color: #fff;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            animation: tv-flicker 0.15s infinite;
        }

        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            opacity: 0;
            z-index: 10000;
            pointer-events: none;
            animation: change-channel 0.4s ease-out;
        }

        .sidebar {
            width: 300px;
            background-color: #000;
            border-right: 5px solid #ff007f;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 10px 0px 20px rgba(255, 0, 127, 0.4);
            position: fixed;
            top: 0; bottom: 0; left: 0;
            z-index: 1000;
        }

        .sidebar-title {
            color: #ffff00;
            font-size: 2.2rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 3px 3px 0px #ff007f;
            animation: text-glitch 1s infinite alternate;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-btn {
            background: #0d0d0d;
            color: #fff;
            border: 3px solid #00ffff;
            padding: 15px;
            font-size: 1.2rem;
            text-decoration: none;
            text-transform: uppercase;
            text-align: center;
            box-shadow: 4px 4px 0px #ff007f;
            display: block;
        }

        .nav-btn:hover, .nav-btn.active {
            background: #ff007f;
            color: #fff;
            border-color: #ffff00;
            box-shadow: -4px -4px 0px #00ffff;
        }

        .main-content {
            margin-left: 300px;
            flex-grow: 1;
            padding: 60px;
            background-image: linear-gradient(rgba(255, 0, 128, 0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .hotline-logo {
            text-align: center;
            position: relative;
            transform: rotate(-4deg) skewX(-10deg);
            margin-bottom: 20px;
            filter: drop-shadow(5px 5px 0px #00ffff);
        }

        .logo-top {
            font-size: 5.5rem;
            display: block;
            text-transform: uppercase;
            line-height: 0.8;
            background: linear-gradient(to bottom, #fff 0%, #ff007f 40%, #ff00ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            font-style: italic;
        }

        .logo-bottom {
            font-size: 6.5rem;
            display: block;
            text-transform: uppercase;
            line-height: 0.8;
            background: linear-gradient(to bottom, #ffff00 0%, #ff5500 60%, #ff007f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        .epic-panel {
            background: rgba(0, 0, 0, 0.9);
            border: 4px solid #ff007f;
            padding: 30px;
            max-width: 750px;
            width: 100%;
            box-shadow: 0 0 40px rgba(255, 0, 127, 0.5), inset 0 0 20px rgba(0, 255, 255, 0.2);
            position: relative;
        }

        .epic-panel::before {
            content: "RE-PLAY";
            position: absolute;
            top: -15px;
            left: 20px;
            background: #ffff00;
            color: #000;
            padding: 2px 10px;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .panel-title {
            color: #00ff00;
            font-family: monospace;
            font-size: 1.4rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .rec-dot {
            width: 12px;
            height: 12px;
            background-color: #ff0000;
            border-radius: 50%;
            animation: rec-blink 0.8s infinite alternate;
        }

        .msg-text {
            color: #fff;
            font-size: 1.6rem;
            line-height: 1.5;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
            border-left: 5px solid #00ffff;
            padding-left: 15px;
        }

        .question-highlight {
            color: #ffff00;
            font-size: 1.8rem;
            text-align: center;
            margin-top: 15px;
            font-style: italic;
            animation: text-glitch 0.5s infinite alternate;
        }

        @keyframes tv-flicker {
            0% { opacity: 0.98; }
            50% { opacity: 0.96; }
            100% { opacity: 1; }
        }

        @keyframes change-channel {
            0% { opacity: 1; background: #fff; }
            30% { background: #444; }
            100% { opacity: 0; }
        }

        @keyframes text-glitch {
            0% { text-shadow: 3px 2px 0px #ff007f, -3px -2px 0px #00ffff; }
            100% { text-shadow: -3px -3px 0px #ff007f, 2px 2px 0px #00ffff; }
        }

        @keyframes rec-blink {
            0% { opacity: 0.2; }
            100% { opacity: 1; box-shadow: 0 0 10px #ff0000; }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; position: relative; border-right: none; border-bottom: 5px solid #ff007f; }
            .main-content { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-title">Hotline Menu</div>
        <nav class="sidebar-menu">
            <a href="index.html" class="nav-btn active">Principal</a>
            <a href="hotline-1.html" class="nav-btn">Hotline Miami</a>
            <a href="hotline-2.html" class="nav-btn">Hotline Miami 2</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="hotline-logo">
            <span class="logo-top">Hotline</span>
            <span class="logo-bottom">Miami</span>
        </div>

        <div class="epic-panel">
            <div class="panel-title">
                <div class="rec-dot"></div>
                <span>CONTESTADORA: MENSAJE NO LEIDO</span>
            </div>
            <p class="msg-text">
                "Hola, somos del servicio de limpieza de Miami. Tenemos un problema de plagas enorme en el edificio central. Encargate de que no quede nada vivo."
            </p>
            <p class="question-highlight">
                ¿De verdad disfrutas lastimar a otras personas?
            </p>
        </div>
    </div>

</body>
</html>
